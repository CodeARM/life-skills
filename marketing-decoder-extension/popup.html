<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      background: #1a1a2e;
      color: #e8e8f0;
      padding: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }

    .logo-icon {
      font-size: 20px;
    }

    .logo-text {
      font-size: 15px;
      font-weight: 600;
      color: #a78bfa;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #888;
      margin-bottom: 6px;
    }

    input[type="password"], input[type="text"] {
      width: 100%;
      padding: 8px 10px;
      background: #16213e;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      color: #e8e8f0;
      font-size: 13px;
      font-family: monospace;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus {
      border-color: #a78bfa;
    }

    .show-toggle {
      font-size: 11px;
      color: #a78bfa;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 0;
      margin-top: 4px;
      font-family: inherit;
    }

    button.save {
      width: 100%;
      margin-top: 14px;
      padding: 9px;
      background: #a78bfa;
      color: #1a1a2e;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.15s;
    }

    button.save:hover { opacity: 0.9; }

    .status {
      margin-top: 10px;
      font-size: 12px;
      text-align: center;
      min-height: 18px;
      color: #6ee7b7;
    }

    .status.error { color: #f87171; }

    .hint {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid rgba(255,255,255,0.07);
      font-size: 11px;
      color: #666;
      line-height: 1.5;
    }

    .hint a {
      color: #a78bfa;
      text-decoration: none;
    }

    .hint strong {
      color: #aaa;
    }
  </style>
</head>
<body>
  <div class="logo">
    <span class="logo-icon">📋</span>
    <span class="logo-text">Marketing Decoder</span>
  </div>

  <label for="apikey">Anthropic API Key</label>
  <input type="password" id="apikey" placeholder="sk-ant-..." />
  <button class="show-toggle" id="toggle">Show key</button>

  <button class="save" id="save">Save Key</button>
  <div class="status" id="status"></div>

  <div class="hint">
    <strong>How to use:</strong> Select any text on a webpage, right-click, and choose <em>"Decode with Marketing Decoder"</em>.<br><br>
    Get your API key at <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
